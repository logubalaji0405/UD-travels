<style>
    .tn-navbar {
        background: rgba(15, 76, 92, 0.95);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(15, 76, 92, 0.20);
        padding: 10px 0;
        border-bottom: 1px solid rgba(233, 160, 59, 0.25);
        z-index: 999;
    }

    .tn-navbar .container {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
    }

    .tn-logo {
        font-size: 1.5rem;
        font-weight: 800;
        color: #fff !important;
        letter-spacing: 0.5px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
    }

    .logo-icon {
        font-size: 1.2rem;
    }

    .tn-search-wrap {
        flex: 0 0 250px;
    }

    .tn-search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 30px;
        padding: 8px 14px;
        width: 100%;
        margin: 0;
    }

    .tn-search-box i {
        color: #FFD166;
        margin-right: 8px;
        font-size: 14px;
    }

    .tn-search-box input {
        border: none;
        outline: none;
        background: transparent;
        color: white;
        width: 100%;
        font-size: 14px;
    }

    .tn-search-box input::placeholder {
        color: rgba(255, 255, 255, 0.72);
    }

    .tn-menu-area {
        flex: 1;
    }

    .tn-nav-links {
        display: flex;
        justify-content: center;
        width: 100%;
    }

    .tn-nav-links .nav-link {
        color: #eaf7fb !important;
        font-weight: 600;
        margin: 0 8px;
        position: relative;
        transition: 0.3s ease;
        white-space: nowrap;
    }

    .tn-nav-links .nav-link:hover,
    .tn-nav-links .nav-link.active {
        color: #FFD166 !important;
    }

    .tn-nav-links .nav-link::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0;
        height: 2px;
        background: linear-gradient(to right, #E9A03B, #FFD166);
        transition: width 0.3s ease;
        border-radius: 10px;
    }

    .tn-nav-links .nav-link:hover::after,
    .tn-nav-links .nav-link.active::after {
        width: 100%;
    }

    .tn-profile-area {
        display: flex;
        align-items: center;
        margin-left: auto;
    }

    .tn-login-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #E9A03B, #FFD166);
        color: #5a3a00;
        font-weight: 800;
        box-shadow: 0 8px 18px rgba(233, 160, 59, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .tn-dropdown {
        border: none;
        border-radius: 16px;
        padding: 10px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        background: #ffffff;
        min-width: 220px;
    }

    .tn-dropdown .dropdown-item {
        border-radius: 10px;
        padding: 10px 12px;
        color: #35515b;
        font-weight: 500;
        transition: 0.3s ease;
    }

    .tn-dropdown .dropdown-item:hover {
        background: #eef7fa;
        color: #0F4C5C;
    }

    .tn-toggler {
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 10px;
        border-radius: 10px;
    }

    .tn-toggler .navbar-toggler-icon {
        filter: brightness(0) invert(1);
    }

    @media (max-width: 991px) {
        .tn-navbar .container {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 10px;
        }

        .tn-logo {
            font-size: 1.1rem;
        }

        .tn-search-wrap {
            flex: unset;
            width: 100%;
        }

        .tn-search-box {
            padding: 7px 12px;
        }

        .tn-search-box input {
            font-size: 13px;
        }

        .tn-toggler {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tn-menu-area {
            grid-column: 1 / -1;
            width: 100%;
        }

        .navbar-collapse {
            margin-top: 10px;
            background: rgba(8, 45, 54, 0.98);
            border-radius: 16px;
            padding: 14px;
        }

        .tn-nav-links {
            display: block;
        }

        .tn-nav-links .nav-link {
            display: block;
            margin: 6px 0;
            padding: 10px 12px;
            border-radius: 10px;
        }

        .tn-nav-links .nav-link:hover {
            background: rgba(255, 255, 255, 0.08);
        }
    }
</style>

<nav class="navbar navbar-expand-lg tn-navbar fixed-top">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand tn-logo" href="{% url 'home' %}">
            <span class="logo-icon">🌴</span> UD-Traveler
        </a>

        <!-- Search -->
        <div class="tn-search-wrap">
            <form method="get" action="{% url 'destination' %}" class="tn-search-box">
                <i class="bi bi-search"></i>
                <input type="text" name="search" placeholder="Search..." value="{{ request.GET.search }}">
            </form>
        </div>

        <!-- Mobile Menu Button -->
        <button class="navbar-toggler tn-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"
            aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse tn-menu-area" id="menu">
            <ul class="navbar-nav mx-auto tn-nav-links">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                        href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'destination' %}active{% endif %}"
                        href="{% url 'destination' %}">Destinations</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'gallery' %}active{% endif %}"
                        href="{% url 'gallery' %}">Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
                        href="{% url 'contact' %}">Contact</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
                        href="{% url 'about' %}">About</a>
                </li>
            </ul>
        </div>

        <!-- Profile -->
        <div class="tn-profile-area dropdown">
            <button class="tn-login-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                {% if user.is_authenticated and not user.is_superuser %}
                {{ user.username|slice:":1"|upper }}
                {% else %}
                <i class="bi bi-person"></i>
                {% endif %}
            </button>

            <ul class="dropdown-menu dropdown-menu-end tn-dropdown">
                {% if user.is_authenticated and not user.is_superuser %}
                <li class="dropdown-item text-center fw-bold">
                    👋 Welcome {{ user.username }}
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>

                <li>
                    <a class="dropdown-item" href="{% url 'profile' %}">
                        <i class="bi bi-person-circle"></i> Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item" href="{% url 'booking_history' %}">
                        <i class="bi bi-bag-check"></i> My Bookings
                    </a>
                </li>

                <li>
                    <hr class="dropdown-divider">
                </li>

                {% else %}
                <li>
                    <a class="dropdown-item" href="{% url 'login' %}">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                </li>

                <li>
                    <hr class="dropdown-divider">
                </li>

                <li>
                    <a class="dropdown-item" href="{% url 'register' %}">
                        <i class="bi bi-person-plus"></i> Register
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>

    </div>

</nav>
